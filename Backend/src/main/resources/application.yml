spring:
  security:
    oauth2:
      client:
        registration:
          jumpcloud:
            client-id: ${JUMPCLOUD_CLIENT_ID}
            client-secret: ${JUMPCLOUD_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            scope:
              - openid
              - profile
              - email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/jumpcloud"
        provider:
          jumpcloud:
            issuer-uri: https://oauth.id.eu.jumpcloud.com/

  datasource:
    url: jdbc:postgresql://localhost:5432/ide_analyste
    username: analyste_user
    password: analyste_pass

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.security: TRACE
server:
  servlet:
    session:
      cookie:
        same-site: lax
        secure: false # Mettre "true" le jour où on déploit sur un vrai serveur en HTTPScookie:
